<svg width="40" height="60" viewBox="0 0 40 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Stem -->
  <rect x="18" y="25" width="4" height="35" fill="#228B22" rx="2"/>
  
  <!-- Leaves - more elongated for hyacinth -->
  <ellipse cx="10" cy="35" rx="12" ry="6" fill="#32CD32" transform="rotate(-20 10 35)"/>
  <ellipse cx="30" cy="35" rx="12" ry="6" fill="#32CD32" transform="rotate(20 30 35)"/>
  
  <!-- Hyacinth flower spike (multiple small flowers) -->
  <circle cx="20" cy="15" r="3" fill="#9370DB"/>
  <circle cx="20" cy="12" r="3" fill="#8A2BE2"/>
  <circle cx="20" cy="9" r="3" fill="#9932CC"/>
  <circle cx="17" cy="18" r="2.5" fill="#BA55D3"/>
  <circle cx="23" cy="18" r="2.5" fill="#BA55D3"/>
</svg>